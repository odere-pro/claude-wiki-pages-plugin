name: adversarial

# Tier 4 — weekly adversarial sweep.
#
# Runs three jobs:
#   1. osv-scanner — dependency vulnerabilities (Go, npm, PyPI, etc.)
#   2. prompt-injection corpus replay — deterministic replay of the checked-in
#      corpus (tests/fixtures/adversarial/) against the real PreToolUse hook
#      chain; no LLM or API key needed
#   3. garak — NVIDIA's LLM red-team tool (OWASP LLM Top 10); requires
#      ANTHROPIC_API_KEY and remains probe-listing only until a target binding
#      to the plugin surface (an agent endpoint) exists
#
# All jobs are best-effort: findings are filed as issues, not merge blockers.

on:
  schedule:
    # Mondays at 04:00 UTC.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # The `secrets` and `env` contexts are not available in a job-level `if`, so
  # the API-key presence check runs here in a step and is exposed as an output
  # the dependent jobs gate on via the `needs` context.
  gate:
    name: gate — detect ANTHROPIC_API_KEY
    runs-on: ubuntu-latest
    outputs:
      has_api_key: ${{ steps.check.outputs.has_api_key }}
    steps:
      - id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "has_api_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_api_key=false" >> "$GITHUB_OUTPUT"
          fi

  osv-scan:
    name: osv-scanner — dependency vulnerabilities
    # Reusable workflows must be invoked at the job level via `uses:`, not as a step.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
    permissions:
      contents: read
      security-events: write

  prompt-injection:
    name: prompt-injection corpus replay
    runs-on: ubuntu-latest
    # Deterministic: replays the checked-in corpus (tests/fixtures/adversarial/)
    # against the real PreToolUse hook chain — no LLM, no API key, no gate.
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Replay PI corpus against the PreToolUse hook chain
        run: |
          # block-*.json cases must be blocked by the hooks (out-of-vault
          # writes, raw/ edits, frontmatter spoofing, markdown-link smuggling);
          # allow-*.json cases document the structural/semantic boundary.
          # Driver: tests/adversarial/replay-corpus.sh (also run in Tier 1 via
          # tests/scripts/replay-corpus.bats).
          bash tests/adversarial/replay-corpus.sh
          # Future extension (API-key gated): LLM-driven full-ingest replay of a
          # HuggingFace prompt-injection-eval slice through /claude-wiki-pages:ingest.

  garak:
    name: garak — LLM red-team
    runs-on: ubuntu-latest
    needs: gate
    if: ${{ needs.gate.outputs.has_api_key == 'true' }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install garak
        run: pip install garak
      - name: Run garak baseline probes
        run: |
          # Scope: run only the OWASP LLM Top 10 baseline probes against the
          # ingest and query surfaces. Full garak runs take hours; we sample.
          # TODO: wire a proper target binding. For the initial run, garak
          # probes the Anthropic API directly with no plugin context.
          garak --model_type anthropic.AnthropicAPI --probes lmrc --list_probes \
            || echo "[SKIP] garak target not yet bound to plugin surface."

  report:
    name: Aggregate findings
    runs-on: ubuntu-latest
    needs: [osv-scan, prompt-injection, garak]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: File an issue on new findings
        uses: actions/github-script@v7
        with:
          script: |
            const anyFailed = ${{ contains(needs.*.result, 'failure') }};
            if (!anyFailed) {
              core.info("No adversarial findings this week.");
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Adversarial sweep — ${new Date().toISOString().slice(0,10)}`,
              body: `Weekly Tier 4 sweep flagged one or more issues. See the ` +
                    `[workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ["security", "adversarial"]
            });
