# Lychee broken-link checker configuration.
# Run locally: lychee --config .lychee.toml .

# Timeout and retry
max_retries = 2
retry_wait_time = 2
timeout = 20

# Skip external hosts that rate-limit or require auth
exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^mailto:",
  # GitHub rate-limits anonymous link checks aggressively.
  # The repo is verified by hand during release; the checker handles internal links.
  "^https?://github\\.com/odere-pro/claude-wiki-pages-plugin",
  # The Pages site's own canonical / og:url — self-referential, only live after
  # the pages.yml deploy; not a broken link in the doc sense.
  "^https?://odere-pro\\.github\\.io/claude-wiki-pages-plugin",
]

# Internal link resolution
# (base is resolved from the CLI source argument — see tests/run-tests.sh)
include_fragments = false
accept = ["200", "204", "206", "301", "302", "303", "304", "307", "308", "429"]

# Ignore link types that are not reachable in CI
exclude_loopback = true
# exclude_mail dropped (not in current lychee schema); mailto: is excluded via exclude pattern above
include_mail = false
exclude_path = [
  "tests/test_helper",
  "node_modules",
  "tmp",
  # Calibration-flow fixtures are deliberately-crafted test corpora — they
  # contain planted hazards (e.g. an injection payload URL) that are data,
  # not real links to verify.
  ".claude/fixtures",
  # As-emitted ADR-0011 measured-run evidence — model output is data, not
  # prose; links inside it are not ours to fix.
  "tests/eval/runs",
]

# Only scan markdown and YAML for links in CI
max_concurrency = 16
