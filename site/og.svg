<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cf6c8"/>
      <stop offset="1" stop-color="#7ab8f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="-5%" r="75%">
      <stop offset="0" stop-color="#1d3a30"/>
      <stop offset="0.6" stop-color="#0e0f13" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0f13"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Mark: rounded tile + chevron 'W', matches the favicon -->
  <g transform="translate(96, 120)">
    <rect width="96" height="96" rx="21" fill="#15161c" stroke="#2c3340" stroke-width="2"/>
    <path d="M27 66V30l21 24 21-24v36" fill="none" stroke="#7cf6c8" stroke-width="7.2"
      stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <text x="216" y="186" font-size="34" font-weight="600" fill="#e7eefb" letter-spacing="-0.5">
    claude<tspan fill="#7cf6c8">·</tspan>wiki-pages
  </text>

  <!-- Tagline kicker -->
  <text x="96" y="312" font-size="26" fill="#7cf6c8" letter-spacing="2"
    font-weight="600">KARPATHY'S LLM WIKI · FOR CLAUDE CODE</text>

  <!-- Headline -->
  <text x="92" y="404" font-size="78" font-weight="700" fill="#e7eefb"
    font-family="Inter, system-ui, sans-serif" letter-spacing="-2">An <tspan fill="url(#accent)">agent-operable</tspan></text>
  <text x="92" y="492" font-size="78" font-weight="700" fill="#e7eefb"
    font-family="Inter, system-ui, sans-serif" letter-spacing="-2">wiki that heals itself.</text>

  <!-- Sub-line -->
  <text x="96" y="552" font-size="26" fill="#9aa6b8">
    Four layers · deterministic Bun engine · reversible auto-heal.
  </text>

  <!-- Footer chip -->
  <text x="96" y="592" font-size="21" fill="#6b7689">Apache-2.0 · Bash for the reflexes, Bun for the brain</text>
</svg>
